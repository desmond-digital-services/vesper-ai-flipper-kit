<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <!-- Flipper Zero body gradient -->
    <linearGradient id="flipperBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <!-- Screen gradient -->
    <linearGradient id="flipperScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#ff6600"/>
    </linearGradient>
    <!-- Phone body gradient -->
    <linearGradient id="phoneBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <!-- Phone screen gradient -->
    <linearGradient id="phoneScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2636"/>
    </linearGradient>
    <!-- Glow -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0066ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Blue accent glow -->
    <radialGradient id="blueGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0066ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Cable gradient -->
    <linearGradient id="cable" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="50%" stop-color="#666"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
  </defs>

  <!-- Background glow -->
  <ellipse cx="400" cy="260" rx="380" ry="220" fill="url(#glow)"/>

  <!-- === FLIPPER ZERO (left) === -->
  <g transform="translate(140, 80)">
    <!-- Shadow -->
    <rect x="8" y="8" width="200" height="310" rx="18" fill="#000" opacity="0.3"/>
    <!-- Body -->
    <rect x="0" y="0" width="200" height="310" rx="18" fill="url(#flipperBody)" stroke="#3a3a3a" stroke-width="1.5"/>
    <!-- Inner border -->
    <rect x="4" y="4" width="192" height="302" rx="15" fill="none" stroke="#333" stroke-width="0.5"/>
    
    <!-- D-Pad area (top) -->
    <!-- Screen -->
    <rect x="24" y="28" width="152" height="128" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
    <rect x="28" y="32" width="144" height="120" rx="4" fill="url(#flipperScreen)"/>
    <!-- Screen content: Flipper mascot silhouette -->
    <g opacity="0.9">
      <!-- Flipper dolphin icon simplified -->
      <ellipse cx="100" cy="80" rx="30" ry="22" fill="#fff" opacity="0.15"/>
      <circle cx="88" cy="74" r="4" fill="#fff" opacity="0.6"/>
      <!-- Text lines on screen -->
      <rect x="50" y="110" width="100" height="3" rx="1.5" fill="#fff" opacity="0.3"/>
      <rect x="60" y="120" width="80" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
      <rect x="70" y="130" width="60" height="3" rx="1.5" fill="#fff" opacity="0.15"/>
    </g>
    
    <!-- D-Pad -->
    <g transform="translate(100, 195)">
      <!-- Up -->
      <rect x="-10" y="-22" width="20" height="16" rx="3" fill="#333" stroke="#444" stroke-width="0.5"/>
      <!-- Down -->
      <rect x="-10" y="6" width="20" height="16" rx="3" fill="#333" stroke="#444" stroke-width="0.5"/>
      <!-- Left -->
      <rect x="-22" y="-10" width="16" height="20" rx="3" fill="#333" stroke="#444" stroke-width="0.5"/>
      <!-- Right -->
      <rect x="6" y="-10" width="16" height="20" rx="3" fill="#333" stroke="#444" stroke-width="0.5"/>
      <!-- Center -->
      <rect x="-10" y="-10" width="20" height="20" rx="3" fill="#2a2a2a" stroke="#444" stroke-width="0.5"/>
      <!-- Center button -->
      <circle cx="0" cy="0" r="5" fill="#0066ff" opacity="0.6"/>
    </g>
    
    <!-- Back button -->
    <rect x="28" y="240" width="50" height="22" rx="6" fill="#333" stroke="#444" stroke-width="0.5"/>
    <text x="53" y="255" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="9" font-weight="500">Back</text>
    
    <!-- Action button -->
    <circle cx="152" cy="251" r="14" fill="#333" stroke="#444" stroke-width="0.5"/>
    <circle cx="152" cy="251" r="8" fill="#2a2a2a"/>
    <text x="152" y="255" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="8" font-weight="500">OK</text>
    
    <!-- Top buttons -->
    <rect x="20" y="8" width="16" height="6" rx="2" fill="#333"/>
    <rect x="42" y="8" width="16" height="6" rx="2" fill="#333"/>
    
    <!-- Label -->
    <text x="100" y="296" text-anchor="middle" fill="#555" font-family="Inter,sans-serif" font-size="10" font-weight="600" letter-spacing="2">FLIPPER ZERO</text>
  </g>

  <!-- === CONNECTION VISUAL === -->
  <!-- Bluetooth/USB connection line -->
  <g opacity="0.5">
    <path d="M340 230 Q400 200 460 230" stroke="#0066ff" stroke-width="2" fill="none" stroke-dasharray="6,4">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Bluetooth icon -->
    <g transform="translate(395, 195)">
      <circle cx="0" cy="0" r="14" fill="#0066ff" opacity="0.15"/>
      <path d="M0-8 L0 8 M-5-4 L0-8 L5-3 L0 2 L5 8 L0 3 L-5-3" stroke="#0066ff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- === PHONE (right) === -->
  <g transform="translate(460, 55)">
    <!-- Shadow -->
    <rect x="8" y="8" width="180" height="350" rx="22" fill="#000" opacity="0.3"/>
    <!-- Body -->
    <rect x="0" y="0" width="180" height="350" rx="22" fill="url(#phoneBody)" stroke="#2a2a2a" stroke-width="1.5"/>
    
    <!-- Notch -->
    <rect x="55" y="6" width="70" height="22" rx="11" fill="#0a0a0a"/>
    <circle cx="82" cy="17" r="4" fill="#1a1a2a"/>
    <circle cx="98" cy="17" r="3" fill="#1a1a2a"/>
    
    <!-- Screen -->
    <rect x="10" y="32" width="160" height="286" rx="8" fill="url(#phoneScreen)"/>
    
    <!-- Vesper App UI on screen -->
    <g>
      <!-- Status bar -->
      <text x="20" y="48" fill="#6a8caa" font-family="Inter,sans-serif" font-size="8" font-weight="500">Vesper AI</text>
      <circle cx="155" cy="44" r="5" fill="#2a3a4a" stroke="#3a4a5a" stroke-width="0.5"/>
      
      <!-- Chat bubble - user question -->
      <rect x="16" y="60" width="128" height="28" rx="8" fill="#1e2d3d" stroke="#2a3d50" stroke-width="0.5"/>
      <text x="26" y="78" fill="#8899aa" font-family="Inter,sans-serif" font-size="8">"What's this card?"</text>
      
      <!-- AI response bubble -->
      <rect x="16" y="96" width="140" height="48" rx="8" fill="#0066ff" opacity="0.12" stroke="#0066ff" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="26" y="112" fill="#7ab8ff" font-family="Inter,sans-serif" font-size="7.5" font-weight="500">MF Classic 1K (13.56MHz)</text>
      <text x="26" y="124" fill="#5a8ab8" font-family="Inter,sans-serif" font-size="7">UID: A0:B1:C2:D3:E4:F5</text>
      <text x="26" y="136" fill="#5a8ab8" font-family="Inter,sans-serif" font-size="7">Sector: 0/16 • Block: 0/64</text>
      
      <!-- Scanning indicator -->
      <rect x="16" y="152" width="140" height="32" rx="8" fill="#1e2d3d"/>
      <circle cx="30" cy="168" r="6" fill="#00cc88" opacity="0.6">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <text x="44" y="165" fill="#6a8caa" font-family="Inter,sans-serif" font-size="7" font-weight="500">Scanning...</text>
      <text x="44" y="177" fill="#4a6a8a" font-family="Inter,sans-serif" font-size="6.5">125kHz • Sub-GHz • NFC</text>
      
      <!-- Action buttons -->
      <rect x="16" y="192" width="65" height="24" rx="6" fill="#0066ff" opacity="0.8"/>
      <text x="48" y="208" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-size="7.5" font-weight="600">Read</text>
      
      <rect x="88" y="192" width="65" height="24" rx="6" fill="#2a3d50"/>
      <text x="120" y="208" text-anchor="middle" fill="#8899aa" font-family="Inter,sans-serif" font-size="7.5" font-weight="500">Clone</text>
      
      <rect x="16" y="224" width="140" height="24" rx="6" fill="#2a3d50"/>
      <text x="86" y="240" text-anchor="middle" fill="#8899aa" font-family="Inter,sans-serif" font-size="7.5" font-weight="500">Scan Frequencies</text>
      
      <!-- Bottom nav -->
      <line x1="10" y1="264" x2="170" y2="264" stroke="#2a3d50" stroke-width="0.5"/>
      <g transform="translate(38, 280)">
        <circle cx="0" cy="0" r="8" fill="#0066ff" opacity="0.15"/>
        <rect x="-3" y="-4" width="6" height="8" rx="1" fill="#0066ff"/>
      </g>
      <g transform="translate(90, 280)">
        <circle cx="0" cy="0" r="8" fill="transparent"/>
        <circle cx="0" cy="-2" r="4" fill="none" stroke="#4a6a8a" stroke-width="1"/>
        <path d="M-4 2 Q0 6 4 2" stroke="#4a6a8a" stroke-width="1" fill="none"/>
      </g>
      <g transform="translate(142, 280)">
        <circle cx="0" cy="0" r="8" fill="transparent"/>
        <circle cx="0" cy="0" r="4" fill="none" stroke="#4a6a8a" stroke-width="1"/>
      </g>
    </g>
    
    <!-- Home indicator -->
    <rect x="60" y="330" width="60" height="4" rx="2" fill="#333"/>
    
    <!-- Label -->
    <text x="90" y="358" text-anchor="middle" fill="#555" font-family="Inter,sans-serif" font-size="9" font-weight="600" letter-spacing="1">MOTO G PLAY</text>
  </g>

  <!-- === CABLES at bottom === -->
  <g transform="translate(0, 420)" opacity="0.4">
    <!-- USB-C cable for Flipper -->
    <path d="M240 0 L240 30" stroke="url(#cable)" stroke-width="3" stroke-linecap="round"/>
    <rect x="234" y="28" width="12" height="6" rx="2" fill="#555"/>
    <text x="240" y="50" text-anchor="middle" fill="#444" font-family="Inter,sans-serif" font-size="8">USB-C</text>
    
    <!-- USB-C cable for Phone -->
    <path d="M550 0 L550 30" stroke="url(#cable)" stroke-width="3" stroke-linecap="round"/>
    <rect x="544" y="28" width="12" height="6" rx="2" fill="#555"/>
    <text x="550" y="50" text-anchor="middle" fill="#444" font-family="Inter,sans-serif" font-size="8">USB-C</text>
  </g>

  <!-- === SD CARD === -->
  <g transform="translate(680, 380)" opacity="0.5">
    <rect x="0" y="0" width="50" height="36" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
    <rect x="4" y="4" width="42" height="28" rx="2" fill="#333"/>
    <text x="25" y="22" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="6" font-weight="700">32GB</text>
  </g>
</svg>
